<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Territory Map</title>

  <!-- Leaflet CSS + JS from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { height: 100vh; width: 100%; }

    /* State name labels (rendered directly on the map) */
    .state-label {
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-shadow:
        0 0 3px rgba(0,0,0,0.8),
        0 0 2px rgba(0,0,0,0.9),
        1px 1px 0 rgba(0,0,0,0.6),
        -1px -1px 0 rgba(0,0,0,0.6);
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      font-family: system-ui, -apple-system, sans-serif;
      letter-spacing: 0.3px;
      width: max-content;
    }
    .state-label-small { font-size: 10px; }

    /* Info panel (top right) */
    .info {
      padding: 8px 12px;
      background: white;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      font-size: 14px;
      line-height: 1.4;
    }
    .info h4 { margin: 0 0 6px; color: #333; }

    /* Popup styling */
    .leaflet-popup-content { margin: 12px 14px; font-size: 14px; }
    .popup-content h3 {
      margin: 0 0 4px;
      font-size: 18px;
      color: #222;
    }
    .popup-content .territory-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .popup-content .role-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin: 10px 0 6px;
    }
    .popup-content .pm-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .popup-content .pm {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
    }
    .popup-content .pm img,
    .popup-content .pm .pm-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #eee;
      background: #f5f5f5;
    }
    .popup-content .pm .pm-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #888;
    }
    .popup-content .pm-name {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-top: 4px;
      text-align: center;
      line-height: 1.2;
    }
    .popup-content .popup-phone {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      text-align: center;
      font-size: 17px;
    }
    .popup-content .md-dcm-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: nowrap;
    }
    .popup-content .md-section,
    .popup-content .dcm-section {
      flex: 0 0 auto;
    }
    .popup-content .popup-phone a {
      color: #1a2c8c;
      text-decoration: none;
      font-weight: 700;
    }
    .popup-content .popup-phone a:hover { text-decoration: underline; }
    .popup-content .popup-email {
      text-align: center;
      font-size: 15px;
      margin-top: 6px;
    }
    .popup-content .popup-email a {
      color: #1a2c8c;
      text-decoration: none;
      font-weight: 500;
    }
    .popup-content .popup-email a:hover { text-decoration: underline; }
    .popup-content .md-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
    }
    .popup-content .md-name {
      font-size: 13px;
      color: #444;
      padding: 2px 0;
    }

    /* Sales Regions popup */
    .region-popup h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }
    .region-badge {
      display: inline-block;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.5px;
      padding: 4px 12px;
      border-radius: 3px;
      margin-bottom: 14px;
    }
    .region-director {
      font-size: 18px;
      font-weight: 600;
      color: #222;
      margin-bottom: 10px;
    }
    .region-title {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }
    .region-contact {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    .region-contact a {
      color: #1a2c8c;
      text-decoration: none;
    }
    .region-contact a:hover { text-decoration: underline; }

    /* Legend (bottom right) */
    .legend {
      padding: 8px 12px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.6;
    }
    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }
  </style>
</head>

    // ---------------------------------------------------------------
    // 2. INITIALIZE THE MAP
    // ---------------------------------------------------------------
    const map = L.map('map', {
      scrollWheelZoom: false
    });
    // Default view: fit the contiguous U.S. tight to the viewport, like a
    // standard atlas-style framing with minimal surrounding ocean.
    map.fitBounds([[24.5, -125], [49.5, -66.5]]);

    // Light, unobtrusive basemap. Swap for any tile provider you like.
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ---------------------------------------------------------------
    // SALES REGIONS (alternate view)
    // Two-region split with a director for each region.
    // ---------------------------------------------------------------
    const salesRegionByState = {
      // R1 — West (blue) — Mike Espinosa
      "Washington - West": "R1", "Washington - East": "R1",
      "Oregon - West": "R1", "Oregon - East": "R1",
      "California - North": "R1", "California - South": "R1",
      "Nevada": "R1", "Idaho": "R1", "Montana": "R1", "Wyoming": "R1",
      "Utah": "R1", "Arizona": "R1", "Colorado": "R1", "New Mexico": "R1",
      "Nebraska": "R1", "Kansas": "R1", "Oklahoma": "R1", "Missouri": "R1",
      "Arkansas": "R1", "Texas - North": "R1", "Texas - South": "R1",
      "Alaska": "R1", "Hawaii": "R1",

      // R2 — East (gray) — Tucker Franks
      "North Dakota": "R2", "South Dakota": "R2", "Minnesota": "R2", "Iowa": "R2",
      "Wisconsin": "R2", "Illinois": "R2", "Michigan": "R2", "Indiana": "R2",
      "Ohio": "R2", "Kentucky": "R2", "Tennessee": "R2", "Mississippi": "R2",
      "Alabama": "R2", "Georgia": "R2", "Florida": "R2", "South Carolina": "R2",
      "North Carolina": "R2", "Virginia": "R2", "West Virginia": "R2",
      "Pennsylvania": "R2", "New York": "R2", "Maine": "R2", "New Hampshire": "R2",
      "Vermont": "R2", "Massachusetts": "R2", "Connecticut": "R2", "Rhode Island": "R2",
      "New Jersey": "R2", "Delaware": "R2", "Maryland": "R2", "Louisiana": "R2",
      "District of Columbia": "R2"
    };

    const salesRegionInfo = {
      "R1": {
        label: "West – R1",
        color: "#808080",
        director: "Mike Espinosa",
        phone: "888-333-3422",
        email: "Ameristarregion1@assaabloy.com"
      },
      "R2": {
        label: "East – R2",
        color: "#1a2c8c",
        director: "Tucker Franks",
        phone: "888-333-3422",
        email: "Ameristarregion2@assaabloy.com"
      }
    };

    // Sales Regions is the single view. Click popup shows full PM/MD details.
    // ---------------------------------------------------------------
    // 3. STYLE EACH STATE (colored by sales region)
    // ---------------------------------------------------------------
    function styleFeature(feature) {
      const stateName = feature.properties.name;
      const region = salesRegionByState[stateName];
      const color = region ? salesRegionInfo[region].color : "#cccccc";
      return {
        fillColor: color,
        weight: 1,
        opacity: 1,
        color: "white",
        fillOpacity: 0.9
      };
    }

    // ---------------------------------------------------------------
    // 4. HOVER + CLICK INTERACTIONS
    // ---------------------------------------------------------------
    let geojsonLayer;

    function highlightFeature(e) {
      const layer = e.target;
      layer.setStyle({ weight: 3, color: "#333", fillOpacity: 1 });
      layer.bringToFront();
      info.update(layer.feature.properties);
    }

    function resetHighlight(e) {
      geojsonLayer.resetStyle(e.target);
      info.update();
    }

    // Render one project manager (photo + name).
    // Looks up the embedded image in photoData; falls back gracefully if missing.
    // If pm.specialty is set, the wrapper div gets a native browser tooltip
    // shown on hover.
    function renderPM(pm) {
      const src = photoData[pm.photo] || "";
      const imgTag = src
        ? '<img src="' + src + '" alt="' + pm.name + '">'
        : '<div class="pm-placeholder">' + pm.name.split(" ").map(n => n[0]).join("") + '</div>';
      const tooltip = pm.specialty ? ' title="' + pm.specialty + '"' : '';
      return (
        '<div class="pm"' + tooltip + '>' +
          imgTag +
          '<div class="pm-name">' + pm.name + '</div>' +
        '</div>'
      );
    }

    function buildPopupHtml(stateName) {
      const territory = territoryByState[stateName];
      if (!territory) {
        return "<b>" + stateName + "</b><br>Unassigned";
      }
      const meta = territoryInfo[territory];
      const mds = marketDevelopersByState[stateName] || [];
      const mdHtml = mds.length
        ? '<div class="md-section">' +
            '<div class="role-label">Market Developer' + (mds.length > 1 ? "s" : "") + '</div>' +
            '<div class="pm-row">' +
              mds.map(function(name) {
                const info = marketDeveloperInfo[name] || {};
                return renderPM({ name: name, photo: info.photo });
              }).join("") +
            '</div>' +
          '</div>'
        : '';
      const dcmName = dcmByState[stateName];
      const dcmHtml = dcmName
        ? '<div class="dcm-section">' +
            '<div class="role-label">Distribution Channel Manager</div>' +
            '<div class="pm-row">' +
              renderPM({ name: dcmName, photo: (dcmInfo[dcmName] || {}).photo }) +
            '</div>' +
          '</div>'
        : '';
      const mdDcmHtml = (mdHtml || dcmHtml)
        ? '<div class="md-dcm-row">' + mdHtml + dcmHtml + '</div>'
        : '';
      // Combine all project managers into one section, tagging each with its
      // specialty so we can show it on hover.
      const allPMs = []
        .concat(meta.highSecurity.map(function (pm) {
          return Object.assign({}, pm, { specialty: "High Security" });
        }))
        .concat(meta.commercialIndustrial.map(function (pm) {
          return Object.assign({}, pm, { specialty: "Commercial/Industrial" });
        }));
      const aspName = aspPmByState[stateName];
      if (aspName) {
        allPMs.push({
          name: aspName,
          photo: (aspPmInfo[aspName] || {}).photo,
          specialty: "Ameristar Security Products"
        });
      }
      const region = salesRegionByState[stateName];
      const regionEmail = region ? salesRegionInfo[region].email : null;
      const emailHtml = regionEmail
        ? '<div class="popup-email"><a href="mailto:' + regionEmail + '">' + regionEmail + '</a></div>'
        : '';
      return (
        '<div class="popup-content">' +
          '<h3>' + stateName + '</h3>' +
          '<div class="territory-label">' + territory + ' Territory</div>' +
          '<div class="role-label">Project Managers</div>' +
          '<div class="pm-row">' + allPMs.map(renderPM).join("") + '</div>' +
          mdDcmHtml +
          '<div class="popup-phone"><a href="tel:+18883333422">888-333-3422</a></div>' +
          emailHtml +
        '</div>'
      );
    }

    function onEachFeature(feature, layer) {
      const stateName = feature.properties.name;
      layer.bindPopup(buildPopupHtml(stateName), { maxWidth: 420, minWidth: 380 });
      layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight
      });
    }

    // ---------------------------------------------------------------
    // 5. INFO PANEL (top right)
    // ---------------------------------------------------------------
    const info = L.control({ position: "topright" });
    info.onAdd = function () {
      this._div = L.DomUtil.create("div", "info");
      this.update();
      return this._div;
    };
    info.update = function (props) {
      if (props) {
        const region = salesRegionByState[props.name];
        const regionLabel = region ? salesRegionInfo[region].label : "Unassigned";
        this._div.innerHTML =
          "<h4>" + props.name + "</h4>" +
          "Region: <b>" + regionLabel + "</b><br>" +
          "<span style='color:#666;font-size:12px;'>Click for project managers</span>";
      } else {
        this._div.innerHTML = "<h4>Sales Regions</h4>Hover over a state";
      }
    };
    info.addTo(map);

    // ---------------------------------------------------------------
    // 6. LEGEND (bottom right)
    // ---------------------------------------------------------------
    const legend = L.control({ position: "bottomright" });
    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");
      let html = "<h4 style='margin:0 0 6px;'>Sales Regions</h4>";
      for (const [key, meta] of Object.entries(salesRegionInfo)) {
        html +=
          '<div style="margin-bottom:8px">' +
            '<i style="background:' + meta.color + '"></i>' +
            '<b>' + meta.label + '</b><br>' +
            '<span style="margin-left:26px;font-size:12px;color:#555">' + meta.director + ', Director</span>' +
          '</div>';
      }
      div.innerHTML = html;
      return div;
    };
    legend.addTo(map);

      "Maryland":      { text: "MD", anchor: [39.0, -76.8] },
      "Michigan":      { text: "MI", anchor: [43.4, -84.8] },
      "Minnesota":     { text: "MN", anchor: [46.3, -94.3] },
      "Mississippi":   { text: "MS", anchor: [32.7, -89.7] },
      "Missouri":      { text: "MO", anchor: [38.4, -92.5] },
      "Montana":       { text: "MT", anchor: [47.0, -109.5] },
      "Nebraska":      { text: "NE", anchor: [41.5, -99.8] },
      "Nevada":        { text: "NV", anchor: [39.0, -117.0] },
      "New Mexico":    { text: "NM", anchor: [34.4, -106.1] },
      "New York":      { text: "NY", anchor: [42.9, -75.5] },
      "North Carolina":{ text: "NC", anchor: [35.5, -79.3] },
      "North Dakota":  { text: "ND", anchor: [47.4, -100.5] },
      "Ohio":          { text: "OH", anchor: [40.3, -82.7] },
      "Oklahoma":      { text: "OK", anchor: [35.4, -97.5] },
      "Pennsylvania":  { text: "PA", anchor: [40.9, -77.7] },
      "South Carolina":{ text: "SC", anchor: [34.0, -81.0] },
      "South Dakota":  { text: "SD", anchor: [44.4, -100.2] },
      "Tennessee":     { text: "TN", anchor: [35.8, -86.4] },
      "Utah":          { text: "UT", anchor: [39.3, -111.7] },
      "Virginia":      { text: "VA", anchor: [37.8, -78.5] },
      "West Virginia": { text: "WV", anchor: [38.7, -80.6] },
      "Wisconsin":     { text: "WI", anchor: [44.6, -89.9] },
      "Wyoming":       { text: "WY", anchor: [43.0, -107.5] },
      "Iowa":          { text: "IA", anchor: [42.0, -93.4] }
    };
    // Small states get abbreviated labels so they don't overflow
    const SMALL_STATES = new Set([
      "Rhode Island","Connecticut","Delaware","District of Columbia",
      "New Hampshire","Vermont","Massachusetts","New Jersey","Maryland"
    ]);
    const STATE_ABBR = {
      "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","Colorado":"CO",
      "Connecticut":"CT","Delaware":"DE","District of Columbia":"DC","Florida":"FL",
      "Georgia":"GA","Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN",
      "Iowa":"IA","Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME",
      "Maryland":"MD","Massachusetts":"MA","Michigan":"MI","Minnesota":"MN",
      "Mississippi":"MS","Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV",
      "New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY",
      "North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK",
      "Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD",
      "Tennessee":"TN","Utah":"UT","Vermont":"VT","Virginia":"VA","West Virginia":"WV",
      "Wisconsin":"WI","Wyoming":"WY"
    };
    // Compute a visually-centered label anchor using pole-of-inaccessibility:
    // the point inside the polygon that is farthest from any edge. This is the
    // standard technique for placing labels on irregular shapes (Wikipedia's
    // state abbreviation map uses the same idea) and looks more "centered"
    // than a centroid for L-shaped or notched states.
    //
    // Simplified approach: grid search inside the polygon's bounding box,
    // scoring each interior point by its minimum distance to any edge, then
    // refining around the best point. Fast enough for 50 states at load time.

    function polygonArea(ring) {
      let a = 0;
      for (let i = 0, n = ring.length; i < n - 1; i++) {
        a += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
      }
      return a / 2;
    }

    function pointInRing(pt, ring) {
      // Ray-casting point-in-polygon
      const x = pt[0], y = pt[1];
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        const intersect = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / (yj - yi + 1e-12) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function distToSegmentSq(px, py, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      let t = lenSq === 0 ? 0 : ((px - ax) * dx + (py - ay) * dy) / lenSq;
      if (t < 0) t = 0; else if (t > 1) t = 1;
      const qx = ax + t * dx, qy = ay + t * dy;
      const ddx = px - qx, ddy = py - qy;
      return ddx * ddx + ddy * ddy;
    }

    function minDistToRing(pt, ring) {
      let minSq = Infinity;
      for (let i = 0, n = ring.length; i < n - 1; i++) {
        const d = distToSegmentSq(pt[0], pt[1], ring[i][0], ring[i][1], ring[i+1][0], ring[i+1][1]);
        if (d < minSq) minSq = d;
      }
      return Math.sqrt(minSq);
    }

    function poleOfInaccessibility(ring) {
      // Find bounds
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      ring.forEach(function (pt) {
        if (pt[0] < minX) minX = pt[0];
        if (pt[0] > maxX) maxX = pt[0];
        if (pt[1] < minY) minY = pt[1];
        if (pt[1] > maxY) maxY = pt[1];
      });
      // Grid search
      let best = null, bestScore = -1;
      const STEPS = 40;
      const dx = (maxX - minX) / STEPS;
      const dy = (maxY - minY) / STEPS;
      for (let i = 1; i < STEPS; i++) {
        for (let j = 1; j < STEPS; j++) {
          const pt = [minX + i * dx, minY + j * dy];
          if (!pointInRing(pt, ring)) continue;
          const d = minDistToRing(pt, ring);
          if (d > bestScore) { bestScore = d; best = pt; }
        }
      }
      if (!best) return null;
      // Refine around the best point with a finer grid
      const rdx = dx, rdy = dy;
      const REFINE = 10;
      for (let i = -REFINE; i <= REFINE; i++) {
        for (let j = -REFINE; j <= REFINE; j++) {
          const pt = [best[0] + (i / REFINE) * rdx, best[1] + (j / REFINE) * rdy];
          if (!pointInRing(pt, ring)) continue;
          const d = minDistToRing(pt, ring);
          if (d > bestScore) { bestScore = d; best = pt; }
        }
      }
      return best;
    }

    function getLabelAnchor(feature) {
      const geom = feature.geometry;
      let rings;
      if (geom.type === 'Polygon') {
        rings = [geom.coordinates[0]];
      } else if (geom.type === 'MultiPolygon') {
        rings = geom.coordinates.map(function (poly) { return poly[0]; });
      } else {
        return null;
      }
      // Pick the largest ring (mainland) by absolute area
      let mainRing = null, bestArea = -1;
      rings.forEach(function (ring) {
        const area = Math.abs(polygonArea(ring));
        if (area > bestArea) { bestArea = area; mainRing = ring; }
      });
      if (!mainRing) return null;
      const pole = poleOfInaccessibility(mainRing);
      if (!pole) return null;
      return [pole[1], pole[0]]; // Leaflet uses [lat, lon]
    }

    geojsonLayer.eachLayer(function (layer) {
      const name = layer.feature.properties.name;
      let text, anchor;
      if (name in STATE_LABEL_OVERRIDES) {
        const override = STATE_LABEL_OVERRIDES[name];
        if (override === null) return; // skip duplicate
        text = override.text;
        anchor = override.anchor;
      } else {
        text = STATE_ABBR[name] || name;
        anchor = getLabelAnchor(layer.feature);
        if (!anchor) anchor = layer.getBounds().getCenter();
      }
      const isSmall = SMALL_STATES.has(name);
      const labelClass = isSmall ? "state-label state-label-small" : "state-label";
      // Approximate label dimensions based on text length and font size.
      // We give iconSize + iconAnchor explicitly so Leaflet can keep the label
      // visually centered on its anchor during zoom and pan. Relying on CSS
      // transform for centering breaks during Leaflet's zoom animations.
      const fontSize = isSmall ? 10 : 13;
      const charWidth = fontSize * 0.7; // rough average character width in px
      const padding = 4;
      const iconWidth = Math.ceil(text.length * charWidth) + padding * 2;
      const iconHeight = Math.ceil(fontSize * 1.4);
      L.marker(anchor, {
        icon: L.divIcon({
          className: labelClass,
          html: text,
          iconSize: [iconWidth, iconHeight],
          iconAnchor: [iconWidth / 2, iconHeight / 2]
        }),
        interactive: false,
        keyboard: false
      }).addTo(map);
    });
  </script>
