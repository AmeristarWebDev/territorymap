<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Territory Map</title>

  <!-- Leaflet CSS + JS from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { height: 100vh; width: 100%; }

    /* Info panel (top right) */
    .info {
      padding: 8px 12px;
      background: white;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      font-size: 14px;
      line-height: 1.4;
    }
    .info h4 { margin: 0 0 6px; color: #333; }

    /* Popup styling */
    .leaflet-popup-content { margin: 12px 14px; font-size: 14px; }
    .popup-content h3 {
      margin: 0 0 4px;
      font-size: 18px;
      color: #222;
    }
    .popup-content .territory-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .popup-content .role-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin: 10px 0 6px;
    }
    .popup-content .pm-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .popup-content .pm {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
    }
    .popup-content .pm img,
    .popup-content .pm .pm-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #eee;
      background: #f5f5f5;
    }
    .popup-content .pm .pm-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #888;
    }
    .popup-content .pm-name {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-top: 4px;
      text-align: center;
      line-height: 1.2;
    }
    .popup-content .md-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
    }
    .popup-content .md-name {
      font-size: 13px;
      color: #444;
      padding: 2px 0;
    }

    /* Legend (bottom right) */
    .legend {
      padding: 8px 12px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.6;
    }
    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }
  </style>
</head>

    // ---------------------------------------------------------------
    // 2. INITIALIZE THE MAP
    // ---------------------------------------------------------------
    const map = L.map('map', {
      center: [39.5, -98.35],   // geographic center of the US
      zoom: 4,
      scrollWheelZoom: true
    });

    // Light, unobtrusive basemap. Swap for any tile provider you like.
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ---------------------------------------------------------------
    // 3. STYLE EACH STATE BY TERRITORY
    // ---------------------------------------------------------------
    function styleFeature(feature) {
      const stateName = feature.properties.name;
      const territory = territoryByState[stateName];
      const color = territory ? territoryInfo[territory].color : "#cccccc";
      return {
        fillColor: color,
        weight: 1,
        opacity: 1,
        color: "white",
        fillOpacity: 0.75
      };
    }

    // ---------------------------------------------------------------
    // 4. HOVER + CLICK INTERACTIONS
    // ---------------------------------------------------------------
    let geojsonLayer;

    function highlightFeature(e) {
      const layer = e.target;
      layer.setStyle({ weight: 3, color: "#333", fillOpacity: 0.9 });
      layer.bringToFront();
      info.update(layer.feature.properties);
    }

    function resetHighlight(e) {
      geojsonLayer.resetStyle(e.target);
      info.update();
    }

    // Render one project manager (photo + name).
    // Looks up the embedded image in photoData; falls back gracefully if missing.
    function renderPM(pm) {
      const src = photoData[pm.photo] || "";
      const imgTag = src
        ? '<img src="' + src + '" alt="' + pm.name + '">'
        : '<div class="pm-placeholder">' + pm.name.split(" ").map(n => n[0]).join("") + '</div>';
      return (
        '<div class="pm">' +
          imgTag +
          '<div class="pm-name">' + pm.name + '</div>' +
        '</div>'
      );
    }

    function buildPopupHtml(stateName) {
      const territory = territoryByState[stateName];
      if (!territory) {
        return "<b>" + stateName + "</b><br>Unassigned";
      }
      const meta = territoryInfo[territory];
      const mds = marketDevelopersByState[stateName] || [];
      const mdHtml = mds.length
        ? '<div class="role-label">Market Developer' + (mds.length > 1 ? "s" : "") + '</div>' +
          '<div class="md-list">' +
            mds.map(function(name) {
              return '<div class="md-name">' + name + '</div>';
            }).join("") +
          '</div>'
        : '';
      return (
        '<div class="popup-content">' +
          '<h3>' + stateName + '</h3>' +
          '<div class="territory-label">' + territory + ' Territory</div>' +
          '<div class="role-label">High Security</div>' +
          '<div class="pm-row">' + meta.highSecurity.map(renderPM).join("") + '</div>' +
          '<div class="role-label">Commercial Industrial</div>' +
          '<div class="pm-row">' + meta.commercialIndustrial.map(renderPM).join("") + '</div>' +
          mdHtml +
        '</div>'
      );
    }

    function onEachFeature(feature, layer) {
      const stateName = feature.properties.name;
      layer.bindPopup(buildPopupHtml(stateName), { maxWidth: 340, minWidth: 260 });
      layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight
      });
    }

    // ---------------------------------------------------------------
    // 5. INFO PANEL (top right)
    // ---------------------------------------------------------------
    const info = L.control({ position: "topright" });
    info.onAdd = function () {
      this._div = L.DomUtil.create("div", "info");
      this.update();
      return this._div;
    };
    info.update = function (props) {
      if (props) {
        const territory = territoryByState[props.name] || "Unassigned";
        this._div.innerHTML =
          "<h4>" + props.name + "</h4>" +
          "Territory: <b>" + territory + "</b><br>" +
          "<span style='color:#666;font-size:12px;'>Click for project managers</span>";
      } else {
        this._div.innerHTML = "<h4>Project Managers</h4>Hover over a state";
      }
    };
    info.addTo(map);

    // ---------------------------------------------------------------
    // 6. LEGEND (bottom right)
    // ---------------------------------------------------------------
    const legend = L.control({ position: "bottomright" });
    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = "<h4 style='margin:0 0 6px;'>Territories</h4>";
      for (const [name, meta] of Object.entries(territoryInfo)) {
        div.innerHTML +=
          '<i style="background:' + meta.color + '"></i>' + name + "<br>";
      }
      return div;
    };
    legend.addTo(map);

    // ---------------------------------------------------------------
    // 7. LOAD US STATES GEOJSON AND DRAW
    // Public GeoJSON of US states. For production, host the file
    // yourself instead of relying on a third party.
    // ---------------------------------------------------------------
    fetch("https://cdn.jsdelivr.net/gh/PublicaMundi/MappingAPI@master/data/geojson/us-states.json")
      .then(r => r.json())
      .then(data => {
        geojsonLayer = L.geoJson(data, {
          style: styleFeature,
          onEachFeature: onEachFeature
        }).addTo(map);
      })
      .catch(err => {
        document.getElementById("map").innerHTML =
          "<p style='padding:20px'>Failed to load GeoJSON: " + err + "</p>";
      });
  </script>
</body>
</html>
